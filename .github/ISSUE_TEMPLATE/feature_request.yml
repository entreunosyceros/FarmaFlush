name: Solicitud de mejora
description: Proponer una nueva función o mejora en FarmaFLUSH
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe el problema o la necesidad antes que la solución concreta. Así es más fácil valorar la propuesta.

  - type: dropdown
    id: area
    attributes:
      label: Área
      options:
        - Verificador PVP / modo ticket
        - Búsqueda de medicamentos (CIMA, Nomenclátor, Vademécum)
        - Comparador parafarmacia
        - Scrapers / nuevas fuentes online
        - Informe PDF / exportación
        - Matcher / precisión de coincidencias
        - PWA / accesibilidad / UX
        - Documentación
        - Arranque / despliegue
        - Otro
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: ¿Qué problema o necesidad quieres resolver?
      placeholder: "Ej.: Tras verificar un ticket con 5 líneas, no puedo exportar un resumen para llevar al mostrador."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Solución propuesta (opcional)
      description: Cómo imaginas que debería funcionar
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternativas consideradas
    validations:
      required: false

  - type: checkboxes
    id: scope
    attributes:
      label: Alcance
      options:
        - label: Estoy dispuesto/a a contribuir con un PR si la propuesta encaja
          required: false
