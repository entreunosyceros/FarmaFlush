name: Informe de error
description: Algo no funciona como debería en FarmaFLUSH
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Gracias por reportar un error. Cuanta más información des, más fácil será reproducirlo.
        No incluyas datos personales ni tickets de farmacia reales.

  - type: dropdown
    id: area
    attributes:
      label: Área afectada
      options:
        - Verificador PVP individual (/verificar-precio)
        - Modo ticket / exportación PDF (/verificar-ticket)
        - Búsqueda de medicamentos (resultados / ficha)
        - Comparador parafarmacia (/parafarmacia)
        - Scraper de farmacia online
        - Matcher / coincidencias incorrectas
        - Importación Nomenclátor / precios oficiales
        - PWA / interfaz / HTMX
        - Arranque (run_app.sh / run_app.bat)
        - Otro
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Versión o commit
      description: Tag de release o hash de commit si ejecutas desde código fuente
      placeholder: "main @ abc1234"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Pasos para reproducir
      description: Lista numerada de acciones hasta ver el fallo
      placeholder: |
        1. Abrir /verificar-ticket
        2. Introducir «ibuprofeno 600mg 20 comp.» con precio 3,20 €
        3. Pulsar «Verificar ticket»
        4. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportamiento esperado
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Comportamiento actual
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs o capturas
      description: Salida de consola, traceback o capturas (sin datos personales)
      render: shell

  - type: dropdown
    id: environment
    attributes:
      label: Entorno
      options:
        - Linux (run_app.sh)
        - Windows (run_app.bat)
        - Manual (python app.py)
        - Producción (gunicorn / VPS)
        - No lo sé
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Versión de Python (si aplica)
      placeholder: "3.12.x"

  - type: input
    id: scraper
    attributes:
      label: Farmacia online (si aplica)
      description: Solo si el bug es de un scraper concreto
      placeholder: "Dosfarma, Amazon.es, ..."

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmación
      options:
        - label: He buscado en issues abiertas y cerradas y no he encontrado un duplicado
          required: true
